name: Security audit
on:
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
  schedule:
    - cron: "0 0 * * *"

permissions: {}


jobs:
  security_audit:
    name: Cargo Audit
    strategy:
      fail-fast: false
      matrix:
        info:
          - {
              os: "ubuntu-latest",
              target: "x86_64-unknown-linux-gnu",
              cross: false,
            }
    runs-on: ${{ matrix.info.os }}
    permissions: 
      issues: write # Open issue if impacted by a new cargo audit result
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #6.0.2
        with:
          persist-credentials: false
      - name: Run audit action to view any security issues
        uses: actions-rust-lang/audit@410bbe6de17ca06c0a60070cca18c88b485ca5a1 #v1.2.6
        with:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ignore: "RUSTSEC-2023-0071,RUSTSEC-2026-0006"

