name: Stable Release Cross

on:
  push:
    tags:
      - v[0-9]+.*

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Release Stable Artemis via Cross
    strategy:
      matrix:
        info:
          - os: "ubuntu-latest"
        target: ["aarch64-unknown-linux-gnu", "x86_64-unknown-linux-musl","x86_64-unknown-freebsd"]
    runs-on: ${{ matrix.info.os }}
    permissions:
      contents: write # Used to publish releases
    steps:
      - name: Update Rust toolchain
        run: rustup upgrade
      - name: Setup Cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@5597bc27da443ba8bf9a3bc4e5459ea59177de42 # v2.62.4
        with:
          tool: just

      - name: Build Artemis
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: just --shell bash --shell-arg -uc _ci_release_cross "${TARGET}"

      - name: Package Artemis
        shell: bash
        env:
          NAME: artemis
          TARGET: ${{ matrix.target }}
        run: .github/scripts/package.sh

      - name: Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: "artemis*"
          name: "${{ vars.GITHUB_REF_NAME }} - Released!"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
