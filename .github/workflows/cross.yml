name: Nightly Release Cross

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Release Nightly Artemis via Cross
    strategy:
      matrix:
        info:
          - os: "ubuntu-latest"
        target: ["aarch64-unknown-linux-gnu", "x86_64-unknown-linux-musl","x86_64-unknown-freebsd"]
    runs-on: ${{ matrix.info.os }}
    permissions: 
      contents: write # Used to publish releases
    steps:
      - name: Update Rust toolchain
        run: rustup upgrade
      - name: Setup Cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@5597bc27da443ba8bf9a3bc4e5459ea59177de42 # v2.62.4
        with:
          tool: just

      - name: Build Artemis
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: just --shell bash --shell-arg -uc _ci_release_cross ${TARGET}

      - name: Package Artemis
        shell: bash
        env:
          NAME: artemis
          TARGET: ${{ matrix.target }}
        run: .github/scripts/package.sh

      - name: Release
        uses: softprops/action-gh-release@6cbd405e2c4e67a21c47fa9e383d020e4e28b836 # v2.3.3
        with:
          files: "artemis*"
          name: nightly
          tag_name: nightly
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
