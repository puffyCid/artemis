name: Stable Release

on:
  push:
    tags:
      - v[0-9]+.*

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Release Stable Artemis
    strategy:
      matrix:
        info:
          - os: "windows-latest"
            target: "x86_64-pc-windows-msvc"
          - os: "ubuntu-latest"
            target: "x86_64-unknown-linux-gnu"
          - os: "windows-11-arm"
            target: "aarch64-pc-windows-msvc"
    runs-on: ${{ matrix.info.os }}
    permissions:
      contents: write # Used to publish releases
    steps:
      - name: Update Rust toolchain
        run: rustup upgrade
      - name: Setup Auditable
        run: cargo install cargo-auditable

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@5597bc27da443ba8bf9a3bc4e5459ea59177de42 # v2.62.4
        with:
          tool: just

      - name: Build Artemis
        if: matrix.info.os == 'ubuntu-latest'
        env:
          TARGET: ${{ matrix.info.target }}
        run: just _ci_release ${TARGET}

      - name: Build Artemis
        if: matrix.info.os == 'windows-latest'
        env:
          TARGET: ${{ matrix.info.target }}
        run: just --shell pwsh.exe --shell-arg -c _ci_release $env:TARGET

      - name: Build Artemis Windows ARM
        if: matrix.info.os == 'windows-11-arm'
        env:
          TARGET: ${{ matrix.info.target }}
        run: just --shell pwsh.exe --shell-arg -c _ci_release $env:TARGET

      - name: Package Artemis
        shell: bash
        env:
          NAME: artemis
          TARGET: ${{ matrix.info.target }}
        run: .github/scripts/package.sh

      - name: Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: "artemis*"
          name: "${{ vars.GITHUB_REF_NAME }} - Released!"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}