rules:
  stale-action-refs:
    ignore:
      - pullrequest.yml
      - cross.yml
      - cross-release.yml
      - main.yml
      - nightly.yml
      - coverage.yml
      - release.yml
      - packages.yml
      - end2end.yml
  forbidden-uses:
    config:
      allow:
      - actions/checkout
      - actions-rust-lang/audit
      - taiki-e/install-action
      - Swatinem/rust-cache
      - codecov/codecov-action
      - softprops/action-gh-release
      - EmbarkStudios/cargo-deny-action
      - github/codeql-action/upload-sarif
      - zizmorcore/zizmor-action