vmaccepteula
rootpw Vagrant123!
# Use 'US' for standard compatibility
keyboard 'US Default'
# Clear and install to the first disk
clearpart --firstdisk --overwritevmfs
install --firstdisk --overwritevmfs
network --bootproto=dhcp --device=vmnic0
reboot

%firstboot --interpreter=busybox

# 1. Wait long enough for hostd to wake up (Essential for ESXi 8.0)
while ! vim-cmd hostsvc/runtimeinfo; do
sleep 10
done

# 2. Enable SSH by direct file manipulation (Bypasses service dependency)
sed -i 's#/TSM-SSH/policy = "off"#/TSM-SSH/policy = "on"#' /etc/vmware/esx.conf

# refresh neworking on DCUI
vim-cmd hostsvc/net/refresh
# enable & start SSH
vim-cmd hostsvc/enable_ssh
vim-cmd hostsvc/start_ssh
# enable & start ESXi Shell
vim-cmd hostsvc/enable_esx_shell
vim-cmd hostsvc/start_esx_shell

# 3. Open the SSH firewall rule directly
esxcli network firewall ruleset set --ruleset-id=sshServer --enabled=true

# 4. Start the service (Using both methods for redundancy)
/etc/init.d/SSH start
esxcli system service start --service-name=tsm-ssh

# 5. Disable the "SSH is enabled" warning
esxcli system settings advanced set -o /UserVars/SuppressShellWarning -i 1

# 6. Enable GuestIPHack
esxcli system settings advanced set -o /Net/GuestIPHack -i 1

# 7. Backup the configuration so changes survive the next reboot
/sbin/auto-backup.sh